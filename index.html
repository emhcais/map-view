<div id="app"><div <!-- ✅ LEFT SIDEBAR -->
  <div id="sidebar">
    <button id="toggleSidebar">☰</button>

    <div id="controls">

      <h3>Controls</h3>

      <div class="control-group">
        <label><b>Time</b></label>
        <input type="range" id="timeSlider" min="1600" max="1690" value="1600">
        <div id="yearLabel">1600</div>
      </div>

      <div class="control-group">
        <button id="play">▶ Play</button>
      </div>

      <div class="control-group">
        <label><b>Pope</b></label>
        <select id="popeFilter">
          <option value="all">All</option>
          <option>Paul V</option>
          <option>Gregory XV</option>
          <option>Urban VIII</option>
          <option>Innocent X</option>
          <option>Alexander VII</option>
          <option>Clement IX</option>
          <option>Clement X</option>
          <option>Innocent XI</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Region</b></label>
        <select id="regionFilter">
          <option value="all">All</option>
          <option>North Africa</option>
          <option>Ottoman Core</option>
          <option>Balkans</option>
          <option>Anatolia</option>
          <option>Aegean</option>
          <option>Levant</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Location</b></label>
        <select id="locationFilter">
          <option value="all">All</option>
        </select>
      </div>

      <!-- ✅ MAP SELECTOR -->
      <div class="control-group">
        <label><b>Map Style</b></label>
        <select id="basemap">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="arabic">Arabic Labels</option>
        </select>
      </div>

    </div>
  </div>

  <div id="map"></div>
  <div id="legend"></div>

</div>

<style>
#app { position: relative; width: 100%; height: 700px; }

/* ✅ LEFT SIDEBAR */
#sidebar {
  position: absolute;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: white;
  z-index: 1000;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  transition: width 0.3s;
  overflow: hidden;
}

#sidebar.collapsed { width: 40px; }
#sidebar.collapsed #controls { display: none; }

#controls { padding: 10px; }

.control-group { margin-bottom: 12px; }

#toggleSidebar {
  width: 100%;
  height: 40px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

/* ✅ MAP */
#map {
  position: absolute;
  left: 260px;
  right: 0;
  top: 0;
  bottom: 0;
  transition: left 0.3s;
}

#sidebar.collapsed + #map {
  left: 40px;
}

/* ✅ LEGEND */
#legend {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: white;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  max-height: 200px;
  overflow-y: auto;
  z-index: 1001;
}

#sidebar select, #sidebar input, #sidebar button {
  width: 100%;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", function () {

  // ✅ BASEMAPS
  let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

  // ✅ Arabic-friendly map (labels emphasized)
  let arabic = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png');

  const map = L.map('map', { zoomControl: false, layers: [light] }).setView([38,20],4);

  L.control.zoom({ position: 'topright' }).addTo(map);

  let currentBase = light;

  let layer = L.layerGroup().addTo(map);

  const slider = document.getElementById("timeSlider");
  const yearLabel = document.getElementById("yearLabel");
  const playBtn = document.getElementById("play");

  const popeFilter = document.getElementById("popeFilter");
  const regionFilter = document.getElementById("regionFilter");
  const locationFilter = document.getElementById("locationFilter");
  const baseSelect = document.getElementById("basemap");

  const legend = document.getElementById("legend");

  let data = [];
  let currentYear = 1600;
  let pope = "all";
  let region = "all";
  let locationSel = "all";
  let playing = false;

  let colors = {};

  function getColor(loc){
    if(!colors[loc]){
      let i = Object.keys(colors).length;
      colors[loc] = `hsl(${i*40},70%,50%)`;
    }
    return colors[loc];
  }

  Papa.parse("https://raw.githubusercontent.com/emhcais/timeslidermap/main/kepler_radial_layout.csv", {
    download: true,
    header: true,
    complete: function(results){
      data = results.data;

      let locs = [...new Set(data.map(d => d.origin))].sort();
      locs.forEach(l=>{
        let opt = document.createElement("option");
        opt.value = l;
        opt.textContent = l;
        locationFilter.appendChild(opt);
      });

      draw();
    }
  });

  function draw(){
    layer.clearLayers();
    legend.innerHTML = "<b>Locations</b><br>";

    let groups = {};

    data.forEach(row=>{
      let yr = parseInt(row.year);
      if(isNaN(yr) || yr > currentYear) return;

      if(pope!=="all" && row.pope!==pope) return;
      if(region!=="all" && row.region!==region) return;
      if(locationSel!=="all" && row.origin!==locationSel) return;

      if(!groups[row.origin]) groups[row.origin] = [];
      groups[row.origin].push(row);
    });

    Object.entries(groups).forEach(([origin,group])=>{

      let lat = parseFloat(group[0].lat);
      let lon = parseFloat(group[0].lon);
      let color = getColor(origin);

      legend.innerHTML += `<div><span style="color:${color}">●</span> ${origin}</div>`;

      let center = L.circleMarker([lat,lon],{
        radius:6,color:color
      }).addTo(layer);

      center.bindTooltip(origin+" ("+group.length+")");
      center.on("click",()=>map.setView([lat,lon],6));

      let n = group.length;
      let radius = 0.3;

      group.forEach((row,i)=>{
        let angle = (2*Math.PI*i)/n;

        let newLat = lat + radius*Math.cos(angle);
        let newLon = lon + radius*Math.sin(angle);

        L.polyline([[lat,lon],[newLat,newLon]],{color:color}).addTo(layer);

        let marker = L.circleMarker([newLat,newLon],{
          radius:5,color:color
        }).addTo(layer);

        marker.bindPopup(`
          <b>Name:</b> ${row.name_original || "N/A"}<br>
          <b>Baptismal Name:</b> ${row.name_baptismal || "N/A"}<br>
          <b>Pope:</b> ${row.pope || "N/A"}<br>
          <b>Year:</b> ${row.year || "N/A"}<br>
          <b>Location:</b> ${row.origin || "N/A"}<br>
          <b>Region:</b> ${row.region || "N/A"}
        `);

        marker.on("click",()=>map.setView([newLat,newLon],7));
      });
    });

    let decade = Math.floor(currentYear/10)*10;
    yearLabel.innerText = `${currentYear} (${decade}s)`;
  }

  slider.oninput = e => { currentYear = +e.target.value; draw(); };
  popeFilter.onchange = e => { pope = e.target.value; draw(); };
  regionFilter.onchange = e => { region = e.target.value; draw(); };
  locationFilter.onchange = e => { locationSel = e.target.value; draw(); };

  baseSelect.onchange = function(){
    map.removeLayer(currentBase);

    if(this.value==="dark") currentBase = dark;
    else if(this.value==="arabic") currentBase = arabic;
    else currentBase = light;

    map.addLayer(currentBase);
  };

  playBtn.onclick = function(){
    playing = !playing;
    this.innerText = playing ? "⏸ Pause" : "▶ Play";

    if(playing){
      let i=setInterval(()=>{
        if(!playing) return clearInterval(i);

        currentYear++;
        if(currentYear>1690) currentYear = 1600;

        slider.value = currentYear;
        draw();
      },600);
    }
  };

  document.getElementById("toggleSidebar").onclick = function(){
    document.getElementById("sidebar").classList.toggle("collapsed");
  };

});
</script>
