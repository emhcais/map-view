<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button id="toggleSidebar">☰</button>

    <div id="controls">
      <h3>Controls</h3>

      <!-- TIME -->
      <div class="control-group">
        <label><b>Time (Year)</b></label><br>
        <input type="range" id="timeSlider" min="1600" max="1690" value="1600">
        <div id="yearLabel">1600</div>
      </div>

      <!-- PLAY -->
      <div class="control-group">
        <button id="play">▶ Play</button>
      </div>

      <!-- POPE FILTER -->
      <div class="control-group">
        <label><b>Pope</b></label>
        <select id="popeFilter">
          <option value="all">All</option>
          <option>Paul V</option>
          <option>Gregory XV</option>
          <option>Urban VIII</option>
          <option>Innocent X</option>
          <option>Alexander VII</option>
          <option>Clement IX</option>
          <option>Clement X</option>
          <option>Innocent XI</option>
        </select>
      </div>

      <!-- REGION FILTER -->
      <div class="control-group">
        <label><b>Region</b></label>
        <select id="regionFilter">
          <option value="all">All</option>
          <option>North Africa</option>
          <option>Ottoman Core</option>
          <option>Balkans</option>
          <option>Anatolia</option>
          <option>Aegean</option>
          <option>Levant</option>
        </select>
      </div>

      <!-- MAP STYLE -->
      <div class="control-group">
        <label><b>Map Style</b></label>
        <select id="basemap">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- LEGEND -->
  <div id="legend">
    <b>Regions</b><br>
    <span style="color:#e41a1c">●</span> North Africa<br>
    <span style="color:#377eb8">●</span> Ottoman Core<br>
    <span style="color:#4daf4a">●</span> Balkans<br>
    <span style="color:#984ea3">●</span> Anatolia<br>
    <span style="color:#ff7f00">●</span> Aegean<br>
    <span style="color:#ffff33">●</span> Levant
  </div>

</div>

<style>
#app {
  position: relative;
  width: 100%;
  height: 700px;
}

/* SIDEBAR */
#sidebar {
  position: absolute;
  left: 0;
  width: 240px;
  height: 100%;
  background: white;
  z-index: 1000;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  transition: width 0.3s;
  overflow: hidden;   /* ✅ FIX: prevents overflow */
}

/* COLLAPSED STATE */
#sidebar.collapsed {
  width: 40px;
}

/* ✅ HIDE INTERNAL CONTROLS WHEN COLLAPSED */
#sidebar.collapsed #controls {
  display: none;
}

/* CONTROLS */
#controls {
  padding: 10px;
}

.control-group {
  margin-bottom: 15px;
}

#toggleSidebar {
  width: 100%;
  height: 40px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

/* MAP */
#map {
  position: absolute;
  left: 240px;
  right: 0;
  top: 0;
  bottom: 0;
  transition: left 0.3s;
}

#sidebar.collapsed + #map {
  left: 40px;
}

/* LEGEND */
#legend {
  position: absolute;
  bottom: 15px;
  right: 15px;
  background: white;
  padding: 10px;
  font-size: 12px;
}

#sidebar select, #sidebar input, #sidebar button {
  width: 100%;
}
</style>

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
let@1.9.4/dist/leaflet.js"></script>
cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", function () {

  let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

  const map = L.map('map', { layers: [light] }).setView([38, 20], 4);
  let currentBase = light;

  let layer = L.layerGroup().addTo(map);

  const slider = document.getElementById("timeSlider");
  const yearLabel = document.getElementById("yearLabel");
  const playBtn = document.getElementById("play");
  const popeFilter = document.getElementById("popeFilter");
  const regionFilter = document.getElementById("regionFilter");
  const baseSelect = document.getElementById("basemap");

  let data = [];
  let currentYear = 1600;
  let pope = "all";
  let region = "all";
  let playing = false;

  const colors = {
    "North Africa": "#e41a1c",
    "Ottoman Core": "#377eb8",
    "Balkans": "#4daf4a",
    "Anatolia": "#984ea3",
    "Aegean": "#ff7f00",
    "Levant": "#ffff33"
  };

  Papa.parse(
    "https://raw.githubusercontent.com/emhcais/timeslidermap/main/kepler_radial_layout.csv",
    {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        data = results.data;
        draw();
      }
    }
  );

  function draw() {
    layer.clearLayers();

    let groups = {};

    data.forEach(row => {
      let yr = parseInt(row.year);
      if (isNaN(yr)) return;

      if (yr > currentYear) return;
      if (pope !== "all" && row.pope !== pope) return;
      if (region !== "all" && row.region !== region) return;

      if (!groups[row.origin]) groups[row.origin] = [];
      groups[row.origin].push(row);
    });

    Object.values(groups).forEach(group => {

      let lat = parseFloat(group[0].lat);
      let lon = parseFloat(group[0].lon);

      let center = L.circleMarker([lat, lon], {
        radius: 6,
        color: "black"
      }).addTo(layer);

      center.bindTooltip(group[0].origin + " (" + group.length + ")");

      center.on("click", () => map.setView([lat, lon], 6));

      let n = group.length;
      let radius = 0.3;

      group.forEach((row, i) => {

        let angle = (2 * Math.PI * i) / n;

        let newLat = lat + radius * Math.cos(angle);
        let newLon = lon + radius * Math.sin(angle);

        L.polyline([[lat, lon], [newLat, newLon]], {
          color: "#888"
        }).addTo(layer);

        let marker = L.circleMarker([newLat, newLon], {
          radius: 5,
          color: colors[row.region] || "orange"
        }).addTo(layer);

        marker.bindPopup(
          `<b>${row.name_original}</b><br>${row.year}<br>${row.region}`
        );

        marker.on("click", () => map.setView([newLat, newLon], 7));
      });

    });

    yearLabel.innerText = currentYear;
  }

  slider.oninput = e => { currentYear = +e.target.value; draw(); };
  popeFilter.onchange = e => { pope = e.target.value; draw(); };
  regionFilter.onchange = e => { region = e.target.value; draw(); };

  baseSelect.onchange = function() {
    map.removeLayer(currentBase);
    currentBase = this.value === "dark" ? dark : light;
    map.addLayer(currentBase);
  };

  playBtn.onclick = function() {
    playing = !playing;
    this.innerText = playing ? "⏸ Pause" : "▶ Play";

    if (playing) {
      let i = setInterval(() => {
        if (!playing) return clearInterval(i);

        currentYear++;
        if (currentYear > 1690) currentYear = 1600;

        slider.value = currentYear;
        draw();

      }, 600);
    }
  };

  document.getElementById("toggleSidebar").onclick = function() {
    document.getElementById("sidebar").classList.toggle("collapsed");
  };

});
</script>
