<div id="app">

  <!-- SIDEBAR -->
  <div">☰</button>  <div id="sidebar">

    <div id="controls">
      <h3>Controls</h3>

      <div class="control-group">
        <label><b>Time</b></label>
        <input type="range" id="timeSlider" min="1600" max="1690" value="1600">
        <div id="yearLabel">1600</div>
      </div>

      <div class="control-group">
        <button id="play">▶ Play</button>
      </div>

      <div class="control-group">
        <label><b>Pope</b></label>
        <select id="popeFilter">
          <option value="all">All</option>
          <option>Paul V</option>
          <option>Gregory XV</option>
          <option>Urban VIII</option>
          <option>Innocent X</option>
          <option>Alexander VII</option>
          <option>Clement IX</option>
          <option>Clement X</option>
          <option>Innocent XI</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Region</b></label>
        <select id="regionFilter">
          <option value="all">All</option>
          <option>North Africa</option>
          <option>Ottoman Core</option>
          <option>Balkans</option>
          <option>Anatolia</option>
          <option>Aegean</option>
          <option>Levant</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Location</b></label>
        <select id="locationFilter">
          <option value="all">All</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Map Style</b></label>
        <select id="basemap">
          <option value="arabic">Arabic (Default)</option>
          <option value="dark1">Dark 1</option>
          <option value="dark2">Dark 2</option>
        </select>
      </div>
    </div>
  </div>

  <div id="map"></div>
  <div id="legend"></div>

</div>

<style>
body { font-family: Arial, Helvetica, sans-serif; }

#app { position: relative; width: 100%; height: 700px; }

#sidebar {
  position: absolute;
  left: 0;
  width: 260px;
  height: 100%;
  background: white;
  z-index: 1000;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  overflow: hidden;
  transition: width 0.3s;
}

#sidebar.collapsed { width: 40px; }
#sidebar.collapsed #controls { display: none; }

#controls { padding: 10px; }
.control-group { margin-bottom: 12px; }

#toggleSidebar {
  width: 100%;
  height: 40px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

#map {
  position: absolute;
  left: 260px;
  right: 0;
  top: 0;
  bottom: 0;
}

#sidebar.collapsed + #map { left: 40px; }

#legend {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: white;
  padding: 10px;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  z-index: 1001;
}
</style>

<!-- ✅ LIBRARIES -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", function () {

  // ✅ BASEMAPS
  const arabic = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png');
  const dark1 = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
  const dark2 = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png');

  const map = L.map('map', { zoomControl:false, layers:[arabic] }).setView([38,20],4);
  L.control.zoom({ position:'topright' }).addTo(map);

  let currentBase = arabic;
  let layer = L.layerGroup().addTo(map);

  // ✅ HUB ICON (UNCHANGED)
  const hubIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/4856/4856582.png",
    iconSize: [34,34],
    iconAnchor: [17,34]
  });

  let data = [];
  let currentYear = 1600;
  let pope="all", region="all", locSel="all";

  let colors = {};
  function getColor(loc){
    if(!colors[loc]){
      let i = Object.keys(colors).length;
      colors[loc] = `hsl(${i*40},70%,50%)`;
    }
    return colors[loc];
  }

  Papa.parse(
    "https://raw.githubusercontent.com/emhcais/timeslidermap/main/kepler_radial_layout.csv",
    {
      download:true,
      header:true,
      skipEmptyLines:true,
      complete:function(res){
        data = res.data;

        let locs=[...new Set(data.map(d=>d.origin))].sort();
        locs.forEach(l=>{
          let opt=document.createElement("option");
          opt.value=l;
          opt.textContent=l;
          locationFilter.appendChild(opt);
        });

        draw();
      }
    }
  );

  function draw(){
    layer.clearLayers();
    legend.innerHTML="<b>Locations</b><br>";

    let groups={};

    data.forEach(r=>{
      let y=parseInt(r.year);
      if(isNaN(y)||y>currentYear) return;

      if(pope!=="all" && r.pope!==pope) return;
      if(region!=="all" && r.region!==region) return;
      if(locSel!=="all" && r.origin!==locSel) return;

      if(!groups[r.origin]) groups[r.origin]=[];
      groups[r.origin].push(r);
    });

    Object.entries(groups).forEach(([origin,group])=>{

      let lat=parseFloat(group[0].lat);
      let lon=parseFloat(group[0].lon);
      let color=getColor(origin);

      legend.innerHTML += `<div><span style="color:${color}">●</span> ${origin}</div>`;

      // ✅ HUB (PIN)
      let center = L.marker([lat,lon],{icon:hubIcon})
        .addTo(layer)
        .bindTooltip(origin+" ("+group.length+")");

      center.on("click",()=>map.setView([lat,lon],7));

      let n=group.length;
      let radius=0.5;

      group.forEach((row,i)=>{

        let angle=(2*Math.PI*i)/n;

        let newLat=lat+radius*Math.cos(angle);
        let newLon=lon+radius*Math.sin(angle);

        // ✅ LINE
        L.polyline([[lat,lon],[newLat,newLon]],{color:color}).addTo(layer);

        // ✅ NODE = COLORED CIRCLE
        let m=L.circleMarker([newLat,newLon],{
          radius:5,
          color:color,
          fillColor:color,
          fillOpacity:5
        }).addTo(layer);

        m.bindPopup(`
          <b>Name:</b> ${row.name_original || "N/A"}<br>
          <b>Baptismal Name:</b> ${row.name_baptismal || "N/A"}<br>
          <b>Pope:</b> ${row.pope || "N/A"}<br>
          <b>Year:</b> ${row.year || "N/A"}<br>
          <b>Location:</b> ${row.origin || "N/A"}<br>
          <b>Region:</b> ${row.region || "N/A"}
        `);

        m.on("click",()=>map.setView([newLat,newLon],10));
      });
    });

    let decade=Math.floor(currentYear/10)*10;
    yearLabel.innerText=`${currentYear} (${decade}s)`;
  }

  // ✅ CONTROLS
  timeSlider.oninput=e=>{currentYear=+e.target.value;draw();};
  popeFilter.onchange=e=>{pope=e.target.value;draw();};
  regionFilter.onchange=e=>{region=e.target.value;draw();};
  locationFilter.onchange=e=>{locSel=e.target.value;draw();};

  basemap.onchange=function(){
    map.removeLayer(currentBase);
    currentBase = this.value==="dark1"?dark1:(this.value==="dark2"?dark2:arabic);
    map.addLayer(currentBase);
  };

  play.onclick=function(){
    let i=setInterval(()=>{
      currentYear++;
      if(currentYear>1690) currentYear=1600;
      timeSlider.value=currentYear;
      draw();
    },600);
  };

  toggleSidebar.onclick=()=>sidebar.classList.toggle("collapsed");

});
</script>
