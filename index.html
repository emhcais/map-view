<div id="app">

  <!-- ✅ TOP COLLAPSIBLE SIDEBAR -->
  <div id="sidebar">
    <button id="toggleSidebar">☰ Controls</button>

    <div id="controls">

      <div class="control-group">
        <label><b>Time (Year)</b></label>
        <input type="range" id="timeSlider" min="1600" max="1690" value="1600">
        <div id="yearLabel">1600</div>
      </div>

      <div class="control-group">
        <button id="play">▶ Play</button>
      </div>

      <!-- ✅ Pope selector -->
      <div class="control-group">
        <label><b>Pope</b></label>
        <select id="popeFilter">
          <option value="all">All</option>
          <option>Paul V</option>
          <option>Gregory XV</option>
          <option>Urban VIII</option>
          <option>Innocent X</option>
          <option>Alexander VII</option>
          <option>Clement IX</option>
          <option>Clement X</option>
          <option>Innocent XI</option>
        </select>
      </div>

      <!-- ✅ Region selector -->
      <div class="control-group">
        <label><b>Region</b></label>
        <select id="regionFilter">
          <option value="all">All</option>
          <option>North Africa</option>
          <option>Ottoman Core</option>
          <option>Balkans</option>
          <option>Anatolia</option>
          <option>Aegean</option>
          <option>Levant</option>
        </select>
      </div>

      <!-- ✅ Location selector -->
      <div class="control-group">
        <label><b>Location</b></label>
        <select id="locationFilter">
          <option value="all">All</option>
        </select>
      </div>

    </div>
  </div>

  <!-- ✅ MAP -->
  <div id="map"></div>

  <!-- ✅ FIXED LEGEND -->
  <div id="legend"></div>

</div>

<style>
#app {
  position: relative;
  width: 100%;
  height: 700px;
}

/* ✅ TOP BAR STYLE */
#sidebar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  background: white;
  z-index: 1000;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* ✅ collapse */
#controls {
  padding: 10px;
}

#sidebar.collapsed #controls {
  display: none;
}

.control-group {
  margin-bottom: 10px;
}

#toggleSidebar {
  width: 100%;
  height: 40px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

/* ✅ MAP BELOW TOP BAR */
#map {
  position: absolute;
  top: 40px;
  left: 0;
  right: 0;
  bottom: 0;
}

/* ✅ LEGEND FIXED */
#legend {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: white;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  max-height: 200px;
  overflow-y: auto;
  z-index: 1001; /* ✅ ensures always on top */
}

#legend div {
  margin-bottom: 4px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", function () {

  const map = L.map('map').setView([38, 20], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  let layer = L.layerGroup().addTo(map);

  const slider = document.getElementById("timeSlider");
  const yearLabel = document.getElementById("yearLabel");
  const playBtn = document.getElementById("play");
  const popeFilter = document.getElementById("popeFilter");
  const regionFilter = document.getElementById("regionFilter");
  const locationFilter = document.getElementById("locationFilter");
  const legend = document.getElementById("legend");

  let data = [];
  let currentYear = 1600;
  let pope = "all";
  let region = "all";
  let selectedLocation = "all";
  let playing = false;

  let locationColors = {};

  function getColor(loc) {
    if (!locationColors[loc]) {
      let index = Object.keys(locationColors).length;
      locationColors[loc] = `hsl(${index * 40}, 70%, 50%)`;
    }
    return locationColors[loc];
  }

  Papa.parse(
    "https://raw.githubusercontent.com/emhcais/timeslidermap/main/kepler_radial_layout.csv",
    {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        data = results.data;

        let locations = [...new Set(data.map(d => d.origin))].sort();
        locations.forEach(loc => {
          let opt = document.createElement("option");
          opt.value = loc;
          opt.textContent = loc;
          locationFilter.appendChild(opt);
        });

        draw();
      }
    }
  );

  function draw() {
    layer.clearLayers();
    legend.innerHTML = "<b>Locations</b><br>";

    let groups = {};

    data.forEach(row => {
      let yr = parseInt(row.year);
      if (isNaN(yr) || yr > currentYear) return;

      if (pope !== "all" && row.pope !== pope) return;
      if (region !== "all" && row.region !== region) return;
      if (selectedLocation !== "all" && row.origin !== selectedLocation) return;

      if (!groups[row.origin]) groups[row.origin] = [];
      groups[row.origin].push(row);
    });

    Object.entries(groups).forEach(([origin, group]) => {

      let lat = parseFloat(group[0].lat);
      let lon = parseFloat(group[0].lon);
      let color = getColor(origin);

      legend.innerHTML += `<div><span style="color:${color}">●</span> ${origin}</div>`;

      let center = L.circleMarker([lat, lon], {
        radius: 6,
        color: color
      }).addTo(layer);

      center.bindTooltip(origin + " (" + group.length + ")");
      center.on("click", () => map.setView([lat, lon], 6));

      let n = group.length;
      let radius = 0.3;

      group.forEach((row, i) => {

        let angle = (2 * Math.PI * i) / n;

        let newLat = lat + radius * Math.cos(angle);
        let newLon = lon + radius * Math.sin(angle);

        L.polyline([[lat, lon], [newLat, newLon]], {
          color: color
        }).addTo(layer);

        let marker = L.circleMarker([newLat, newLon], {
          radius: 5,
          color: color
        }).addTo(layer);

        marker.bindPopup(`
          <b>${row.name_original}</b><br>
          Baptismal: ${row.name_baptismal}<br>
          Year: ${row.year}<br>
          Pope: ${row.pope}<br>
          Origin: ${row.origin}<br>
          Region: ${row.region}
        `);

        marker.on("click", () => map.setView([newLat, newLon], 7));
      });
    });

    yearLabel.innerText = currentYear;
  }

  slider.oninput = e => { currentYear = +e.target.value; draw(); };
  popeFilter.onchange = e => { pope = e.target.value; draw(); };
  regionFilter.onchange = e => { region = e.target.value; draw(); };
  locationFilter.onchange = e => { selectedLocation = e.target.value; draw(); };

  playBtn.onclick = function() {
    playing = !playing;
    this.innerText = playing ? "⏸ Pause" : "▶ Play";

    if (playing) {
      let i = setInterval(() => {
        if (!playing) return clearInterval(i);

        currentYear++;
        if (currentYear > 1690) currentYear = 1600;

        slider.value = currentYear;
        draw();
      }, 600);
    }
  };

  document.getElementById("toggleSidebar").onclick = function() {
    document.getElementById("sidebar").classList.toggle("collapsed");
  };

});
</script>
