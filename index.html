<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
controls">    <button id="toggleSidebar">☰</button>
      <h3>Controls</h3>

      <div class="control-group">
        <label><b>Time (Year)</b></label><br>
        <input type="range" id="timeSlider" min="1600" max="1690" value="1600">
        <div id="yearLabel">1600</div>
      </div>

      <div class="control-group">
        <button id="play">▶ Play</button>
      </div>

      <!-- ✅ LOCATION SELECTOR (NEW) -->
      <div class="control-group">
        <label><b>Location</b></label>
        <select id="locationFilter">
          <option value="all">All</option>
        </select>
      </div>

      <div class="control-group">
        <label><b>Map Style</b></label>
        <select id="basemap">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- ✅ LEGEND (NOW LOCATION-BASED) -->
  <div id="legend"></div>

</div>

<style>
#app { position: relative; width: 100%; height: 700px; }

#sidebar {
  position: absolute;
  left: 0;
  width: 240px;
  height: 100%;
  background: white;
  z-index: 1000;
  box-shadow: 2px 0 6px rgba(0,0,0,0.2);
  overflow: hidden;
  transition: width 0.3s;
}

#sidebar.collapsed { width: 40px; }
#sidebar.collapsed #controls { display: none; }

#controls { padding: 10px; }

.control-group { margin-bottom: 15px; }

#toggleSidebar {
  width: 100%;
  height: 40px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

#map {
  position: absolute;
  left: 240px;
  right: 0;
  top: 0;
  bottom: 0;
}

#sidebar.collapsed + #map { left: 40px; }

#legend {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: white;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
  max-height: 200px;
  overflow-y: auto;
}

#legend div { margin-bottom: 4px; }

#sidebar select, #sidebar input, #sidebar button {
  width: 100%;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", function () {

  let light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  let dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

  const map = L.map('map', { layers: [light] }).setView([38, 20], 4);
  let currentBase = light;

  let layer = L.layerGroup().addTo(map);

  const slider = document.getElementById("timeSlider");
  const yearLabel = document.getElementById("yearLabel");
  const playBtn = document.getElementById("play");
  const baseSelect = document.getElementById("basemap");
  const locationFilter = document.getElementById("locationFilter");

  let data = [];
  let currentYear = 1600;
  let playing = false;
  let selectedLocation = "all";

  // ✅ LOCATION COLOR SYSTEM
  let locationColors = {};

  function getColor(location) {
    if (!locationColors[location]) {
      let index = Object.keys(locationColors).length;
      locationColors[location] = `hsl(${index * 40}, 70%, 50%)`;
    }
    return locationColors[location];
  }

  Papa.parse(
    "https://raw.githubusercontent.com/emhcais/timeslidermap/main/kepler_radial_layout.csv",
    {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        data = results.data;

        // ✅ populate location dropdown
        let locations = [...new Set(data.map(d => d.origin))].sort();
        locations.forEach(loc => {
          let opt = document.createElement("option");
          opt.value = loc;
          opt.textContent = loc;
          locationFilter.appendChild(opt);
        });

        draw();
      }
    }
  );

  function draw() {
    layer.clearLayers();

    let legend = document.getElementById("legend");
    legend.innerHTML = "<b>Locations</b><br>";

    let groups = {};

    data.forEach(row => {
      let yr = parseInt(row.year);
      if (isNaN(yr) || yr > currentYear) return;

      // ✅ location filter
      if (selectedLocation !== "all" && row.origin !== selectedLocation) return;

      if (!groups[row.origin]) groups[row.origin] = [];
      groups[row.origin].push(row);
    });

    Object.entries(groups).forEach(([origin, group]) => {

      let lat = parseFloat(group[0].lat);
      let lon = parseFloat(group[0].lon);
      let color = getColor(origin);

      // ✅ legend entry
      legend.innerHTML += `<div><span style="color:${color}">●</span> ${origin}</div>`;

      let center = L.circleMarker([lat, lon], {
        radius: 6,
        color: color
      }).addTo(layer);

      center.bindTooltip(origin + " (" + group.length + ")");
      center.on("click", () => map.setView([lat, lon], 6));

      let n = group.length;
      let radius = 0.3;

      group.forEach((row, i) => {

        let angle = (2 * Math.PI * i) / n;

        let newLat = lat + radius * Math.cos(angle);
        let newLon = lon + radius * Math.sin(angle);

        L.polyline([[lat, lon], [newLat, newLon]], {
          color: color
        }).addTo(layer);

        let marker = L.circleMarker([newLat, newLon], {
          radius: 5,
          color: color
        }).addTo(layer);

        // ✅ FULL POPUP (unchanged)
        marker.bindPopup(`
          <b>${row.name_original}</b><br>
          Baptismal Name: ${row.name_baptismal}<br>
          Year: ${row.year}<br>
          Pope: ${row.pope}<br>
          Origin: ${row.origin}<br>
          Region: ${row.region}
        `);

        marker.on("click", () => map.setView([newLat, newLon], 7));
      });
    });

    yearLabel.innerText = currentYear;
  }

  slider.oninput = e => { currentYear = +e.target.value; draw(); };

  locationFilter.onchange = e => {
    selectedLocation = e.target.value;
    draw();
  };

  playBtn.onclick = function() {
    playing = !playing;
    this.innerText = playing ? "⏸ Pause" : "▶ Play";

    if (playing) {
      let i = setInterval(() => {
        if (!playing) return clearInterval(i);

        currentYear++;
        if (currentYear > 1690) currentYear = 1600;

        slider.value = currentYear;
        draw();
      }, 600);
    }
  };

  baseSelect.onchange = function() {
    map.removeLayer(currentBase);
    currentBase = this.value === "dark" ? dark : light;
    map.addLayer(currentBase);
  };

  document.getElementById("toggleSidebar").onclick = function() {
    document.getElementById("sidebar").classList.toggle("collapsed");
  };

});
</script>
